
name: Cloud Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # 允许你在 GitHub 网页上手动点击 "Run workflow" 触发打包

jobs:
  build:
    name: 构建 Android APK
    runs-on: ubuntu-latest

    steps:
    - name: 📦 获取项目代码
      uses: actions/checkout@v3

    - name: ⚙️ 配置 Java 环境 (Android 依托)
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: 📱 配置自动化 Flutter 云环境
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        flutter-version: '3.19.0'
        cache: true

    - name: 📥 下载项目依赖包
      working-directory: ./app
      run: flutter pub get

    - name: 🛠️ 执行 APK 编译打包
      working-directory: ./app
      run: flutter build apk --release

    - name: 🚀 导出成品 APK 供扫码/下载
      uses: actions/upload-artifact@v4
      with:
        name: FluidReader-Release-APK
        path: app/build/app/outputs/flutter-apk/app-release.apk
        retention-days: 7
