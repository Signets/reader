name: fluid_reader
description: 'Fluid Reader — AI 驱动的高质量 TTS 朗读应用'
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  provider: ^6.1.2

  # 本地存储
  shared_preferences: ^2.3.2

  # 网络请求
  http: ^1.2.1

  # 音频播放
  audioplayers: ^6.1.0

  # 字体
  google_fonts: ^6.2.1

  # 文件选择
  file_picker: ^8.1.2

  # 路径工具
  path_provider: ^2.1.3

  # 动画增强
  flutter_animate: ^4.5.0

  # 日期格式化
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
